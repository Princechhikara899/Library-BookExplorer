<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS Folder/style.css">
    <title>Document</title>
</head>
<body class="dark-theme">



    <nav class="navbar">
        <div class="nav-brand">Library</div>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="Search for books by title...">
        </div>
        <div class="nav-controls">
            <button id="toggleBtn" class="btn-outline">Light Mode</button>
            <button id="favoriteBtn" class="btn-outline">View Favorites</button>
        </div>
    </nav>




    <div class="controls-panel">
        <div class="filter-group">
            <label for="yearFilter">Filter by Year:</label>
            <input type="number" id="yearFilter" placeholder="e.g. 2023">
        </div>
        <div class="sort-group">
            <label for="sortSelect">Sort By:</label>
            <select id="sortSelect">
                <option value="relevance">Relevance</option>
                <option value="titleAsc">Title (A-Z)</option>
                <option value="titleDesc">Title (Z-A)</option>
                <option value="yearDesc">Newest First</option>
                <option value="yearAsc">Oldest First</option>
            </select>
        </div>
        <div class="limit-group">
            <label for="limitSelect">Show:</label>
            <select id="limitSelect">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50" selected>50</option>
            </select>
        </div>
        <div class="reset-group">
            <button id="resetFiltersBtn" class="btn-outline">Reset Filters</button>
        </div>
    </div>
    <div id="activeFiltersContainer" class="active-filters"></div>



    <header class="hero">
        <h1>Discover Books</h1>
        <p>Search and explore a curated library collection</p>
    </header>





    <main class="main-content">
        <div id="loadingState" class="state-container hidden">
            <div class="spinner"></div>
            <p>Searching the archives...</p>
        </div>
        <div id="emptyState" class="state-container hidden">
            <p id="emptyMessage">No books found. Try a different search.</p>
        </div>
        <div id="bookGrid" class="book-grid"></div>
    </main>

    

    <div id="bookModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-btn">&times;</button>
        
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalCover" src="" alt="Book Cover" class="modal-cover">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle">Book Title</h2>
                    <h4 id="modalAuthor" class="author-text">Author Name</h4>
                    <p id="modalYear" class="year-text">Publish Year: <span></span></p>
                    
                    <div class="tags-container" id="modalSubjects"></div>
                
                    <div class="description-container">
                        <h3>Description</h3>
                        <p id="modalDescription">Loading description...</p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    

    <script src="./JS Folder/script.js"></script>

</body>
</html>
